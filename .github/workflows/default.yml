name: Default

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: default-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/planbooq?schema=public
      NEXTAUTH_SECRET: ci-placeholder-secret
      NEXTAUTH_URL: http://localhost:3636
      SKIP_ENV_VALIDATION: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build (Next.js only, skip prisma migrate deploy)
        run: pnpm exec next build
