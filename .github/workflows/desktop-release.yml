name: Desktop Release

# Triggered on the same git events that drive a Vercel web deployment, so the
# .dmg pipeline runs alongside the web deploy. Forge publishes as a DRAFT
# release — a human flips it to Published in the GitHub UI when ready, and
# only then do auto-updater clients pick it up.
on:
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "apps/broker/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/desktop-release.yml"
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    env:
      # electron-forge PublisherGithub reads GH_TOKEN
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO_OWNER: ${{ github.repository_owner }}
      GH_REPO_NAME: ${{ github.event.repository.name }}
      # Signing + notarization. Empty values cause forge.config.ts to skip
      # both, producing an unsigned .dmg that builds and uploads anyway.
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Apple Developer ID certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          CERT_PATH=$RUNNER_TEMP/cert.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed -e 's/"//g')

      - name: Build broker
        run: pnpm broker:build

      - name: Typecheck desktop
        run: pnpm desktop:typecheck

      - name: Publish desktop (${{ matrix.arch }})
        run: pnpm --filter @planbooq/desktop publish --arch=${{ matrix.arch }} --platform=darwin

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-logs-${{ matrix.arch }}
          path: |
            apps/desktop/out/make/**
            apps/desktop/out/*.log
          if-no-files-found: ignore
          retention-days: 7
