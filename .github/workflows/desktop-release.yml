name: Desktop Release

# Auto-publishes a real (non-draft) GitHub Release on every push to main that
# touches the desktop wrapper, so the landing page's /api/download/mac CTA
# always resolves to the latest .dmg. Version is derived from commit count so
# every push gets a fresh, monotonically-increasing tag (v0.1.<count>).
#
# Pipeline: prepare (ubuntu, fast — computes version + creates an empty release
# under a stable tag) → build matrix (macos, parallel arm64+x64 — emits .dmgs
# and uploads them as assets). The pre-created release prevents the matrix from
# racing each other on "create release if not exists".
on:
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "apps/broker/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/desktop-release.yml"
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    name: Compute version + create release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # rev-list --count needs the full history.
          fetch-depth: 0

      - name: Compute version from commit count
        id: compute
        run: |
          set -euo pipefail
          patch=$(git rev-list --count HEAD)
          version="0.1.${patch}"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Computed release version: ${version} (tag ${tag})"

      - name: Create or refresh release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.compute.outputs.tag }}
          VERSION: ${{ steps.compute.outputs.version }}
        run: |
          set -euo pipefail
          # Idempotent: workflow re-runs (manual or retry) for the same commit
          # must produce the same release. Delete-then-recreate is simpler
          # than trying to detect "exists with correct sha".
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} exists — deleting before recreate"
            gh release delete "$TAG" --yes --cleanup-tag
          fi
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "Planbooq ${VERSION}" \
            --notes "Automated build from ${{ github.sha }}."

  build:
    name: Build (${{ matrix.arch }})
    needs: prepare
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Signing + notarization. Empty values cause forge.config.ts to skip
      # both, producing an unsigned .dmg that builds and uploads anyway.
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch desktop version
        run: |
          set -euo pipefail
          # In-place version bump for this build only — never committed back.
          # Forge reads package.json at make-time and embeds the version into
          # Info.plist (CFBundleShortVersionString), which electron-updater
          # uses to compare against the latest release tag.
          node -e "const fs=require('fs'); const p='apps/desktop/package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.version=process.env.VERSION; fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');"
          node -e "console.log('desktop version =', require('./apps/desktop/package.json').version)"

      - name: Import Apple Developer ID certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          CERT_PATH=$RUNNER_TEMP/cert.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed -e 's/"//g')

      - name: Build broker
        run: pnpm broker:build

      - name: Typecheck desktop
        run: pnpm desktop:typecheck

      - name: Make desktop .dmg (${{ matrix.arch }})
        run: pnpm --filter @planbooq/desktop make --arch=${{ matrix.arch }} --platform=darwin

      - name: Upload .dmg to release
        run: |
          set -euo pipefail
          dmg=$(find apps/desktop/out/make -name "*.dmg" -print -quit)
          if [ -z "$dmg" ]; then
            echo "No .dmg found under apps/desktop/out/make" >&2
            find apps/desktop/out -type f >&2 || true
            exit 1
          fi
          renamed="Planbooq-${VERSION}-${{ matrix.arch }}.dmg"
          cp "$dmg" "/tmp/${renamed}"
          # --clobber tolerates re-runs / mid-flight retries for the same arch.
          gh release upload "$TAG" "/tmp/${renamed}" --clobber

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-logs-${{ matrix.arch }}
          path: |
            apps/desktop/out/make/**
            apps/desktop/out/*.log
          if-no-files-found: ignore
          retention-days: 7
