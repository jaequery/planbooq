services:
  postgres:
    image: postgres:16
    container_name: planbooq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: planbooq
      POSTGRES_PASSWORD: planbooq
      POSTGRES_DB: planbooq
    ports:
      - "5656:5432"
    volumes:
      - planbooq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planbooq -d planbooq"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  planbooq_postgres_data:
